name: Build WeintCompanion

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag, für das das Release erstellt werden soll (z. B. v0.9.0)"
        required: true

permissions:
  contents: write

jobs:

  linux:

    runs-on: ubuntu-latest

    steps:

      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: linuxdeploy herunterladen
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy

      - name: Linux Build
        run: |
          chmod +x scripts/build_linux.sh
          ./scripts/build_linux.sh

      - name: AppImage erstellen
        run: |
          chmod +x scripts/build_appimage.sh
          ./scripts/build_appimage.sh

      - name: Linux Build hochladen
        uses: actions/upload-artifact@v4
        with:
          name: WeintCompanion-Linux
          path: |
            WeintCompanion-x86_64.AppImage

  windows:

    runs-on: windows-latest

    steps:

      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Windows Build
        shell: powershell
        run: |
          ./scripts/build_windows.ps1

      - name: Windows Build hochladen
        uses: actions/upload-artifact@v4
        with:
          name: WeintCompanion-Windows
          path: |
            dist/WeintCompanion-Setup.exe

  release:

    needs:
      - linux
      - windows

    runs-on: ubuntu-latest

    steps:

      - name: Linux Build herunterladen
        uses: actions/download-artifact@v4
        with:
          name: WeintCompanion-Linux
          path: release/linux

      - name: Windows Build herunterladen
        uses: actions/download-artifact@v4
        with:
          name: WeintCompanion-Windows
          path: release/windows

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          #
          # Bei einem echten Tag-Push (v*) ist github.ref_name bereits der
          # Tag-Name. Bei manuellem workflow_dispatch (z. B. weil der
          # eigentliche Tag-Push keinen Workflow-Run ausgelöst hat) läuft
          # der Job stattdessen gegen einen Branch - ohne den expliziten
          # "tag"-Input würde die Action mangels Tag-Kontext fehlschlagen.
          #
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release/windows/WeintCompanion-Setup.exe
            release/linux/WeintCompanion-x86_64.AppImage